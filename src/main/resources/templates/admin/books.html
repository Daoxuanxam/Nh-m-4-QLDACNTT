<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sách</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="brand-icon"><i class="fas fa-book-open"></i></div>
            <h3>Thư Viện Tri Thức Việt</h3>
        </div>
        <ul class="list-unstyled components">
            <li><a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
            <li class="active"><a th:href="@{/admin/books}"><i class="fas fa-book"></i> <span>Quản lý sách</span></a></li>
            <li><a th:href="@{/admin/borrows}"><i class="fas fa-clipboard-list"></i> <span>Phiếu mượn</span></a></li>
            <li><a th:href="@{/admin/readers}"><i class="fas fa-users"></i> <span>Độc giả</span></a></li>
            <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/staff}"><i class="fas fa-user-tie"></i> <span>Nhân viên</span></a></li>
            <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/statistics}"><i class="fas fa-chart-bar"></i> <span>Thống kê</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <form th:action="@{/auth/logout}" method="post" style="margin:0">
                <button type="submit" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span>Đăng xuất</span>
                </button>
            </form>
        </div>
    </nav>

    <div id="content">
        <nav class="navbar">
            <button id="sidebarCollapse" class="btn btn-toggle"><i class="fas fa-bars"></i></button>
            <span class="navbar-brand ms-3">Quản lý sách</span>
        </nav>
        <div class="container-fluid p-4">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <form th:action="@{/admin/books}" method="get" class="d-flex gap-2">
                                <input type="text" name="search" class="form-control"
                                       placeholder="Tìm kiếm theo tên sách..." th:value="${search}">
                                <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i></button>
                                <a th:href="@{/admin/books}" class="btn btn-outline-secondary">Reset</a>
                            </form>
                        </div>
                        <div class="col-md-6 text-end">
                            <a th:href="@{/admin/books/new}" class="btn btn-success">
                                <i class="fas fa-plus me-2"></i>Thêm sách mới
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-list me-2"></i>Danh sách sách
                        <span class="badge bg-primary ms-2" th:text="${#lists.size(books)}"></span>
                    </h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>#</th><th>Tên sách</th><th>Tác giả</th><th>Thể loại</th>
                                    <th>Tổng SL</th><th>Còn lại</th><th>Trạng thái</th><th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="book, i : ${books}">
                                    <td th:text="${i.count}"></td>
                                    <td>
                                        <strong th:text="${book.title}"></strong>
                                        <br><small class="text-muted" th:text="${book.isbn}"></small>
                                    </td>
                                    <td th:text="${book.author}"></td>
                                    <td>
                                        <span class="badge bg-info" th:if="${book.category != null}"
                                              th:text="${book.category.name}"></span>
                                    </td>
                                    <td th:text="${book.totalCopies}"></td>
                                    <td>
                                        <span th:class="${book.availableCopies > 0} ? 'text-success fw-bold' : 'text-danger fw-bold'"
                                              th:text="${book.availableCopies}"></span>
                                    </td>
                                    <td>
                                        <span th:switch="${book.status?.name()}">
                                            <span th:case="'AVAILABLE'" class="badge bg-success">Có sẵn</span>
                                            <span th:case="'OUT_OF_STOCK'" class="badge bg-warning text-dark">Hết sách</span>
                                            <span th:case="'DISCONTINUED'" class="badge bg-secondary">Ngừng</span>
                                        </span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <a th:href="@{/admin/books/edit/{id}(id=${book.id})}"
                                               class="btn btn-sm btn-outline-primary" title="Sửa">
                                                <i class="fas fa-edit"></i> Sửa
                                            </a>
                                            <form th:action="@{/admin/books/delete/{id}(id=${book.id})}"
                                                  method="post" style="display:inline"
                                                  onsubmit="return confirm('Xóa sách này? Không thể hoàn tác!')">
                                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                                    <i class="fas fa-trash"></i> Xóa
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(books)}">
                                    <td colspan="8" class="text-center py-4 text-muted">
                                        <i class="fas fa-book fa-2x d-block mb-2"></i>Không có sách nào
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
