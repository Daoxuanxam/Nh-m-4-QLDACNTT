<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Thư Viện</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .brand-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #e94560, #f5a623);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem; color: white;
        }
        h2 { color: white; font-weight: 800; text-align: center; }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 2rem; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; border-radius: 12px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #e94560; color: white;
            box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }
        .form-label { color: rgba(255,255,255,0.8); font-weight: 600; }
        .btn-login {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none; border-radius: 12px;
            padding: 12px; font-weight: 700; font-size: 1rem;
            width: 100%; color: white;
            transition: all .3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.5);
            color: white;
        }
        .input-group-text {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            border-radius: 12px 0 0 12px;
        }
        .input-group .form-control { border-radius: 0 12px 12px 0; }
        .divider { border-color: rgba(255,255,255,0.1); }
        a { color: #e94560; }
        a:hover { color: #f5a623; }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-icon"><i class="fas fa-book-open"></i></div>
    <h2>Thư Viện Tri Thức Việt</h2>
    <p class="subtitle">Đăng nhập để tiếp tục</p>

    <div th:if="${param.error}" class="alert alert-danger py-2">
        <i class="fas fa-exclamation-circle me-2"></i>Sai tên đăng nhập hoặc mật khẩu!
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2">
        <i class="fas fa-check-circle me-2"></i>Đăng xuất thành công!
    </div>
    <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

    <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control"
                       placeholder="Nhập tên đăng nhập" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="Nhập mật khẩu" required>
            </div>
        </div>
        <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
    </form>

    <hr class="divider my-4">
    <p class="text-center mb-0" style="color:rgba(255,255,255,0.5)">
        Chưa có tài khoản?
        <a th:href="@{/auth/register}" class="fw-bold">Đăng ký ngay</a>
    </p>
</div>
</body>
</html>
