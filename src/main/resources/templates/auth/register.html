<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Thư Viện</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 2rem 0;
        }
        .register-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 2.5rem;
            width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .brand-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #e94560, #f5a623);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem; font-size: 2rem; color: white;
        }
        h2 { color: white; font-weight: 800; text-align: center; }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 2rem; }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white; border-radius: 12px; padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #e94560; color: white;
            box-shadow: 0 0 0 3px rgba(233,69,96,0.2);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }
        .form-label { color: rgba(255,255,255,0.8); font-weight: 600; }
        .btn-register {
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none; border-radius: 12px; padding: 12px;
            font-weight: 700; font-size: 1rem; width: 100%; color: white; transition: all .3s;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233,69,96,0.5); color:white; }
        .input-group-text {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5); border-radius: 12px 0 0 12px;
        }
        .input-group .form-control { border-radius: 0 12px 12px 0; }
        .divider { border-color: rgba(255,255,255,0.1); }
        a { color: #e94560; } a:hover { color: #f5a623; }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="brand-icon"><i class="fas fa-book-open"></i></div>
    <h2>Tạo tài khoản</h2>
    <p class="subtitle">Đăng ký để sử dụng thư viện</p>

    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${user}">
        <div class="row">
            <div class="col-12 mb-3">
                <label class="form-label">Họ và tên</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                    <input type="text" th:field="*{fullName}" class="form-control"
                           placeholder="Nguyễn Văn A" required>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" th:field="*{username}" class="form-control"
                           placeholder="username" required>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="email@example.com" required>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" th:field="*{password}" class="form-control"
                           placeholder="Tối thiểu 6 ký tự" required minlength="6">
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Số điện thoại</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="text" th:field="*{phone}" class="form-control"
                           placeholder="0912345678">
                </div>
            </div>
            <div class="col-12 mb-4">
                <label class="form-label">Địa chỉ</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                    <input type="text" th:field="*{address}" class="form-control"
                           placeholder="Địa chỉ của bạn">
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-register">
            <i class="fas fa-user-plus me-2"></i>Đăng ký
        </button>
    </form>

    <hr class="divider my-3">
    <p class="text-center mb-0" style="color:rgba(255,255,255,0.5)">
        Đã có tài khoản? <a th:href="@{/auth/login}" class="fw-bold">Đăng nhập</a>
    </p>
</div>
</body>
</html>
